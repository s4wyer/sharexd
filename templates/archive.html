{% extends 'viewer.html' %}

{% block file_display %}
<div class="text-viewer-container">
{% if archive_error %}
<div style="color: #ff5555;">{{ archive_error }}</div>
{% elif archive_contents %}
  <div id="file-browser" class="file-browser">
    <div class="fb-toolbar">
      <div id="fb-path" class="fb-path">&gt; /</div>
      <button id="fb-up" class="fb-up-btn" disabled>[ up   ]</button>
    </div>
    <div id="fb-list" class="fb-content"></div>
  </div>

<script nonce="{{ nonce }}">
  const archiveFiles = [
    {% for f in archive_contents %}
    {
      name: {{ f.name | tojson }},
      size: {{ f.size | tojson }},
      is_dir: {{ f.is_dir | tojson }},
      url: {{ url_for('files.download_archive_file', path=filename, inner_path=f.name) | tojson }}
    }{% if not loop.last %},{% endif %}
    {% endfor %}
  ];

  const browserEl = document.getElementById('file-browser');
  const upBtn = document.getElementById('fb-up');
  const pathEl = document.getElementById('fb-path');
  const listEl = document.getElementById('fb-list');

  let currentPath = '';

  function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  function renderPath(path) {
    currentPath = path;
    pathEl.textContent = '> /' + path;
    upBtn.disabled = path === '';

    listEl.innerHTML = '';
    const items = [];
    const dirs = new Set();

    archiveFiles.forEach(f => {
      let sanitizedName = f.name;
      if (sanitizedName.endsWith('/')) {
        sanitizedName = sanitizedName.slice(0, -1);
      }
      
      if (path) {
        if (sanitizedName === path) return;
        if (!sanitizedName.startsWith(path + '/')) return;
      }
      
      let relativePath = path ? sanitizedName.substring(path.length + 1) : sanitizedName;
      
      const parts = relativePath.split('/');
      
      if (parts.length === 1) {
        if (f.is_dir || f.name.endsWith('/')) {
           if (!dirs.has(parts[0])) {
             dirs.add(parts[0]);
             items.push({...f, name: sanitizedName, displayName: parts[0], is_dir: true});
           }
        } else {
           items.push({...f, displayName: parts[0]});
        }
      } else {
        const dirName = parts[0];
        if (!dirs.has(dirName)) {
          dirs.add(dirName);
          items.push({
            name: path ? path + '/' + dirName : dirName,
            displayName: dirName,
            is_dir: true,
            size: 0
          });
        }
      }
    });

    items.sort((a, b) => {
      if (a.is_dir && !b.is_dir) return -1;
      if (!a.is_dir && b.is_dir) return 1;
      return a.displayName.localeCompare(b.displayName);
    });

    items.forEach(item => {
      const div = document.createElement(item.is_dir ? 'div' : 'a');
      div.className = 'fb-item' + (item.is_dir ? ' is-dir' : '');
      if (!item.is_dir) {
        div.href = item.url;
        div.target = '_blank';
        div.style.textDecoration = 'none';
        div.style.color = 'inherit';
      }
      
      const name = document.createElement('span');
      name.className = 'fb-name';
      
      const nameStart = document.createElement('span');
      nameStart.className = 'fb-name-start';
      
      const nameEnd = document.createElement('span');
      nameEnd.className = 'fb-name-end';
      
      if (item.displayName.length > 12) {
        nameStart.textContent = item.displayName.substring(0, item.displayName.length - 8);
        nameEnd.textContent = item.displayName.substring(item.displayName.length - 8) + (item.is_dir ? '/' : '');
      } else {
        nameStart.textContent = item.displayName;
        nameEnd.textContent = item.is_dir ? '/' : '';
      }
      
      name.appendChild(nameStart);
      name.appendChild(nameEnd);
      
      div.appendChild(name);
      
      if (!item.is_dir) {
        const meta = document.createElement('span');
        meta.className = 'fb-meta';
        meta.textContent = formatSize(item.size);
        div.appendChild(meta);
        

      }
      
      div.addEventListener('click', () => {
        if (item.is_dir) {
          renderPath(item.name);
        }
      });
      
      listEl.appendChild(div);
    });
  }

  upBtn.addEventListener('click', () => {
    if (currentPath) {
      const parts = currentPath.split('/');
      parts.pop();
      renderPath(parts.join('/'));
    }
  });

  renderPath('');
</script>
{% else %}
<div>[Archive is empty or could not be read]</div>
{% endif %}
</div>
{% endblock %}
