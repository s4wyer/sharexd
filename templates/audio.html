{% extends 'viewer.html' %}

{% block file_display %}
					<audio id="audio-player" style="display: none !important;">
						<source src="{{ url_for('files.deliver_file', path=filename) }}" type="{{ mime_type }}">
					</audio>
					
					<div id="custom-player" class="custom-player" style="display: none;">
						<div class="player-header">
							<span class="player-title">&gt; {{ filename }}</span>
							<span id="time-display" class="player-time">00:00 / 00:00</span>
						</div>
						<div id="progress-container" class="player-progress-container">
							<div id="progress-bar" class="player-progress-bar"></div>
						</div>
						<div class="player-controls">
							<a href="#" id="play-btn" class="player-btn">[ play  ]</a>
							<div class="player-spacer"></div>
							<span class="player-vol-label">vol</span>
							<div id="volume-container" class="player-volume-container">
								<div id="volume-bar" class="player-progress-bar" style="width: 100%;"></div>
							</div>
							<a href="#" id="mute-btn" class="player-btn">[ mute   ]</a>
						</div>
					</div>

					<noscript>
						<audio controls class="native-audio">
							<source src="{{ url_for('files.deliver_file', path=filename) }}" type="{{ mime_type }}">
						</audio>
					</noscript>

					<script nonce="{{ nonce }}">
						document.getElementById('custom-player').style.display = 'flex';
						
						const audio = document.getElementById('audio-player');
						const playBtn = document.getElementById('play-btn');
						const timeDisplay = document.getElementById('time-display');
						const progressContainer = document.getElementById('progress-container');
						const progressBar = document.getElementById('progress-bar');
						const muteBtn = document.getElementById('mute-btn');
						const volumeContainer = document.getElementById('volume-container');
						const volumeBar = document.getElementById('volume-bar');

						playBtn.addEventListener('click', (e) => {
							e.preventDefault();
							if (audio.paused) {
								audio.play();
								playBtn.innerText = '[ pause ]';
							} else {
								audio.pause();
								playBtn.innerText = '[ play  ]';
							}
						});

						function formatTime(seconds) {
							if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
							const m = Math.floor(seconds / 60).toString().padStart(2, '0');
							const s = Math.floor(seconds % 60).toString().padStart(2, '0');
							return `${m}:${s}`;
						}

						audio.addEventListener('loadedmetadata', () => {
							timeDisplay.innerText = `${formatTime(0)} / ${formatTime(audio.duration)}`;
						});

						audio.addEventListener('timeupdate', () => {
							timeDisplay.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
							if (isFinite(audio.duration) && audio.duration > 0) {
								const progress = (audio.currentTime / audio.duration) * 100;
								progressBar.style.width = `${progress}%`;
							}
						});

						progressContainer.addEventListener('click', (e) => {
							const rect = progressContainer.getBoundingClientRect();
							const pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
							const dur = isFinite(audio.duration) ? audio.duration : (audio.seekable && audio.seekable.length ? audio.seekable.end(audio.seekable.length - 1) : 0);
							
							if (dur > 0) {
								audio.currentTime = pos * dur;
							}
						});

						audio.addEventListener('volumechange', () => {
							muteBtn.innerText = audio.muted || audio.volume === 0 ? '[ unmute ]' : '[ mute   ]';
							volumeBar.style.width = audio.muted ? '0%' : `${audio.volume * 100}%`;
						});

						muteBtn.addEventListener('click', (e) => {
							e.preventDefault();
							audio.muted = !audio.muted;
						});

						volumeContainer.addEventListener('click', (e) => {
							const rect = volumeContainer.getBoundingClientRect();
							const pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
							audio.volume = pos;
							if (pos > 0) audio.muted = false;
						});
						
						document.addEventListener('keydown', (e) => {
							if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;

							if (e.key === ' ') {
								e.preventDefault();
								playBtn.click();
							} else if (e.key === 'ArrowRight') {
								e.preventDefault();
								const dur = isFinite(audio.duration) ? audio.duration : (audio.seekable && audio.seekable.length ? audio.seekable.end(audio.seekable.length - 1) : audio.currentTime + 5);
								audio.currentTime = Math.min(audio.currentTime + 5, dur);
							} else if (e.key === 'ArrowLeft') {
								e.preventDefault();
								audio.currentTime = Math.max(audio.currentTime - 5, 0);
							}
						});

						audio.addEventListener('ended', () => {
							playBtn.innerText = '[ play  ]';
							progressBar.style.width = '0%';
						});
					</script>
{% endblock %}
