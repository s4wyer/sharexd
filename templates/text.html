{% extends 'viewer.html' %}

{% block file_display %}
					<div class="custom-player">
						<div class="player-header">
							<span class="player-title">&gt; {{ filename }}</span>
							<span class="player-time">{{ line_count }} lines</span>
						</div>
						<div class="text-file-content">
							<pre style="margin: 0; max-width: none;">{{ text_content }}</pre>
						</div>
					</div>
{% endblock %}
